# Training stage
training_stage: expert

# Data
model_path: ./Alpamayo-R1-10B
data_dir: data
clip_list: clips_for_train.json
shuffle: true
min_rollout_steps: 4
max_rollout_steps: 16
samples_per_clip: 300
batch_size: 16
num_workers: 0

# Eval data
eval_data_dir: /home/zekail/alpamayo/dumped_inputs
eval_clip_list: clips_for_eval.json

# Optimization
lr: 1.0e-5
weight_decay: 0.0001
adam_beta1: 0.9
adam_beta2: 0.999
adam_epsilon: 1.0e-8
max_grad_norm: 1.0

# Schedule
num_epochs: 5
warmup_steps: 1000
lr_scheduler_type: cosine

# Batching
gradient_accumulation_steps: 1

# Eval
eval_every_n_steps: 500
eval_steps: 1

# Checkpointing
output_dir: checkpoints_expert_deepspeed
save_every_n_steps: 1000
save_total_limit: 5
resume_from_checkpoint: null

# Logging
log_every_n_steps: 10
wandb_project: alpamayo-r1
wandb_run_name: streaming_train_expert_bs16
wandb_entity: null

# Rollout
rollout_top_p: 0.98
rollout_temperature: 0.6
rollout_num_traj_samples: 1
rollout_max_generation_length: 256

# DeepSpeed
use_deepspeed: false
deepspeed:
  zero_optimization:
    stage: 2
    allgather_partitions: true
    allgather_bucket_size: 2.0e8
    overlap_comm: true
    reduce_scatter: true
    reduce_bucket_size: 2.0e8
    contiguous_gradients: true
